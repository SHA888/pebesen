services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: pebesen_postgres
    environment:
      POSTGRES_DB: pebesen
      POSTGRES_USER: pebesen
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pebesen_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - pebesen_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pebesen -d pebesen"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pebesen_redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - pebesen_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: pebesen_meilisearch
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-pebesen_dev_master_key}
      MEILI_ENV: development
    ports:
      - "7701:7700"
    volumes:
      - meilisearch_data:/meili_data
    networks:
      - pebesen_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 30s
      timeout: 10s
      retries: 3

